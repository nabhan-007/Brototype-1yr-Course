<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Responsive Image Gallery</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container">
      <div class="row">
        <div class="col-6">Left side</div>
        <div class="col-6">Right side</div>
      </div>
    </div>

    <div class="p-5 mb-4 bg-light rounded-3">
      <div class="container-fluid py-5">
        <h1 class="display-5 fw-bold">Custom Hero Section</h1>
        <p class="col-md-8 fs-4">
          Build your own hero using spacing and typography utilities.
        </p>
        <button class="btn btn-primary btn-lg" type="button">Learn more</button>
      </div>
    </div>

    <div style="width: 500px">
      <div class="accordion" id="myAccordion">
        <div class="accordion-item">
          <h2 class="accordion-header" id="headingOne">
            <button
              class="accordion-button"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#collapseOne"
              aria-expanded="true"
              aria-controls="collapseOne"
            >
              Accordion Item #1
            </button>
          </h2>
          <div
            id="collapseOne"
            class="accordion-collapse collapse show"
            aria-labelledby="headingOne"
            data-bs-parent="#myAccordion"
          >
            <div class="accordion-body">
              Content for the first accordion panel.
            </div>
          </div>
        </div>
      </div>
    </div>

    <hr />
    <div class="text-center">
      <a
        href="#"
        class="btn btn-primary btn-lg rounded-pill px-5 fw-bold shadow-sm"
        >View All Free Themes</a
      >
    </div>
    <div class="container my-4">
      <h2 class="text-center mb-4">Responsive Image Gallery</h2>
      <div class="row g-3">
        <!-- Gallery Item -->
        <div class="col-12 col-md-4">
          <img
            src="https://static.vecteezy.com/system/resources/previews/021/433/017/original/sample-rubber-stamp-free-png.png"
            class="img-fluid rounded"
            alt="Gallery Image 1"
          />
        </div>
        <div class="col-12 col-md-4">
          <img
            src="https://static.vecteezy.com/system/resources/previews/021/433/017/original/sample-rubber-stamp-free-png.png"
            class="img-fluid rounded"
            alt="Gallery Image 2"
          />
        </div>
        <div class="col-12 col-md-4">
          <img
            src="https://static.vecteezy.com/system/resources/previews/021/433/017/original/sample-rubber-stamp-free-png.png"
            class="img-fluid rounded"
            alt="Gallery Image 3"
          />
        </div>
        <div class="col-12 col-md-4">
          <img
            src="https://static.vecteezy.com/system/resources/previews/021/433/017/original/sample-rubber-stamp-free-png.png"
            class="img-fluid rounded"
            alt="Gallery Image 4"
          />
        </div>
        <div class="col-12 col-md-4">
          <img
            src="https://static.vecteezy.com/system/resources/previews/021/433/017/original/sample-rubber-stamp-free-png.png"
            class="img-fluid rounded"
            alt="Gallery Image 5"
          />
        </div>
        <div class="col-12 col-md-4">
          <img
            src="https://static.vecteezy.com/system/resources/previews/021/433/017/original/sample-rubber-stamp-free-png.png"
            class="img-fluid rounded"
            alt="Gallery Image 6"
          />
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
